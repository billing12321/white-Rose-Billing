<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHITE ROSE EVENTS - Billing</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    animation: gradientBG 15s ease infinite;
    background-size: 400% 400%;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 20px 50px rgba(30, 60, 114, 0.5);
    transform: translateY(0);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    border: 1px solid rgba(42, 82, 152, 0.2);
}

.container:hover {
    transform: translateY(-5px);
    box-shadow: 0 30px 60px rgba(30, 60, 114, 0.7);
}

h1 {
    text-align: center;
    color: #1e3c72;
    font-size: 2em;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 2px 2px 4px rgba(30, 60, 114, 0.1);
    position: relative;
    padding-bottom: 10px;
}

h1::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #1e3c72, #2a5298, transparent);
    border-radius: 2px;
}

label {
    font-weight: 500;
    margin-top: 10px;
    display: block;
    color: #1e3c72;
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input, select, button {
    width: 100%;
    padding: 10px 12px;
    margin-top: 3px;
    border-radius: 8px;
    border: 2px solid #e0e8f0;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    transition: all 0.3s ease;
}

input:focus, select:focus {
    outline: none;
    border-color: #1e3c72;
    box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
}

input:hover, select:hover {
    border-color: #2a5298;
}

button {
    background: linear-gradient(45deg, #1e3c72, #2a5298);
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
    margin-top: 15px;
    box-shadow: 0 4px 15px rgba(30, 60, 114, 0.3);
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s ease;
}

button:hover::before {
    left: 100%;
}

button:hover {
    background: linear-gradient(45deg, #2a5298, #1e3c72);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(30, 60, 114, 0.5);
}

button:active {
    transform: translateY(0);
}

.row {
    display: flex;
    gap: 15px;
    margin-top: 15px;
}

.row div {
    flex: 1;
}

/* Customer info grid */
.customer-info {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-bottom: 15px;
}

.customer-info div {
    animation: slideIn 0.5s ease forwards;
    opacity: 0;
}

.customer-info div:nth-child(1) { animation-delay: 0.1s; }
.customer-info div:nth-child(2) { animation-delay: 0.2s; }
.customer-info div:nth-child(3) { animation-delay: 0.3s; }

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-top: 20px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(30, 60, 114, 0.1);
}

th {
    background: linear-gradient(45deg, #1e3c72, #2a5298);
    color: white;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.8em;
    letter-spacing: 0.5px;
    padding: 12px 8px;
}

td {
    padding: 10px 8px;
    border-bottom: 1px solid #e0e8f0;
    background: white;
}

tr:last-child td {
    border-bottom: none;
}

tbody tr {
    transition: all 0.3s ease;
}

tbody tr:hover {
    background: #f0f4fc;
    transform: scale(1.01);
    box-shadow: 0 2px 10px rgba(30, 60, 114, 0.1);
}

tbody tr td:first-child {
    font-weight: 500;
}

/* Remove button in table */
td button {
    background: linear-gradient(45deg, #dc3545, #ff4444);
    padding: 5px 10px;
    font-size: 12px;
    width: auto;
    margin: 0;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(220, 53, 69, 0.3);
}

td button:hover {
    background: linear-gradient(45deg, #bb2d3b, #dc3545);
}

.grand {
    text-align: right;
    font-size: 20px;
    margin-top: 20px;
    padding: 15px;
    background: linear-gradient(45deg, #e8eef8, #d4e0f0);
    border-radius: 12px;
    font-weight: 700;
    color: #1e3c72;
    box-shadow: 0 5px 15px rgba(30, 60, 114, 0.1);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.01); }
    100% { transform: scale(1); }
}

.grand span {
    color: #1e3c72;
    font-size: 24px;
    margin-left: 8px;
}

/* Print button special style */
button:last-of-type {
    background: linear-gradient(45deg, #1e3c72, #2a5298);
    box-shadow: 0 4px 15px rgba(30, 60, 114, 0.4);
    margin-top: 15px;
}

button:last-of-type:hover {
    background: linear-gradient(45deg, #2a5298, #1e3c72);
    box-shadow: 0 6px 20px rgba(30, 60, 114, 0.5);
}

/* Item added animation */
@keyframes itemAdded {
    0% { transform: scale(0.95); background: #e8eef8; }
    50% { transform: scale(1.02); background: #e8eef8; }
    100% { transform: scale(1); background: white; }
}

.item-highlight {
    animation: itemAdded 0.5s ease;
}

/* Responsive design */
@media (max-width: 768px) {
    body {
        padding: 5px;
        align-items: flex-start;
    }
    
    .container {
        padding: 15px;
        margin: 5px;
    }

    h1 {
        font-size: 1.6em;
    }

    .row {
        flex-direction: column;
        gap: 8px;
    }

    .customer-info {
        grid-template-columns: 1fr;
    }

    table {
        font-size: 12px;
    }

    td button {
        padding: 4px 6px;
        font-size: 11px;
    }

    .grand {
        font-size: 18px;
        padding: 12px;
    }

    .grand span {
        font-size: 20px;
    }
}

/* Loading animation for buttons */
button.loading {
    position: relative;
    color: transparent;
}

button.loading::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid white;
    border-radius: 50%;
    border-top-color: transparent;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Tooltip styles */
[data-tooltip] {
    position: relative;
    cursor: help;
}

[data-tooltip]:before {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    padding: 4px 8px;
    background: #1e3c72;
    color: white;
    font-size: 11px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
}

[data-tooltip]:hover:before {
    opacity: 1;
    visibility: visible;
    bottom: 120%;
}

/* Empty state */
#invoiceTable tbody:empty::after {
    content: 'No items added yet';
    display: block;
    text-align: center;
    padding: 20px;
    color: #1e3c72;
    font-style: italic;
    background: #e8eef8;
    border-radius: 8px;
    margin-top: 8px;
    border: 2px dashed #2a5298;
}

/* Blue themed scrollbar */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: #e8eef8;
    border-radius: 4px;
}

::-webkit-scrollbar-thumb {
    background: #1e3c72;
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: #2a5298;
}

/* Selection color */
::selection {
    background: #1e3c72;
    color: white;
}

/* Input icons styling */
label i {
    color: #1e3c72;
    margin-right: 5px;
}

/* Remove placeholder styling */
input::placeholder {
    color: transparent;
}

/* For older browsers */
input::-webkit-input-placeholder {
    color: transparent;
}

input::-moz-placeholder {
    color: transparent;
}

input:-ms-input-placeholder {
    color: transparent;
}

input:-moz-placeholder {
    color: transparent;
}
</style>
</head>
<body>

<div class="container">

<h1> WHITE ROSE EVENTS</h1>

<div class="customer-info">
    <div>
        <label data-tooltip="Enter customer full name"><i>👤</i> Customer Name</label>
        <input type="text" id="customer" required>
    </div>

    <div>
        <label data-tooltip="Enter 10-digit mobile number"><i>📞</i> Phone Number</label>
        <input type="tel" id="phone" pattern="[0-9]{10}" maxlength="10"
               oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)" required>
    </div>

    <div>
        <label data-tooltip="Enter booking number"><i>🔖</i> Booking No</label>
        <input type="text" id="bookingno" required>
    </div>
</div>

<div class="row">
    <div>
        <label data-tooltip="Select biriyani type"><i>🍛</i> Select Item</label>
        <select id="item">
            <option value="" disabled selected>─── Select Item ───</option>
            <option value="850">കുട്ടൻ  ബിരിയാണി</option>
            <option value="800">ചിക്കൻ  ബിരിയാണി</option>
            <option value="850">ലെഗോൺ  ബിരിയാണി</option>
            <option value="850">കുട്ടൻ  ഹൈദരാബാദി</option>
            <option value="500">ചിക്കൻ  കേതൽ</option>
        </select>
    </div>

    <div>
        <label data-tooltip="Enter quantity in KG"><i>⚖️</i> Quantity (KG)</label>
        <input type="number" id="quantity" value="1" min="0.5" step="0.5">
    </div>
</div>

<button onclick="addItem()" id="addBtn">➕ Add Item to Bill</button>

<table id="invoiceTable">
    <thead>
        <tr>
            <th>Item</th>
            <th>Price</th>
            <th>KG</th>
            <th>Total</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        <!-- Items will be dynamically added here -->
    </tbody>
</table>

<p class="grand">Grand Total : ₹ <span id="grandTotal">0.00</span></p>

<button onclick="printInvoice()" id="printBtn">🖨️ Print Invoice</button>

</div>

<script src="scriptw.js"></script>

</body>
</html>
